<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kitchen Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Gratine Kitchen Mgmt System</h1>
    <p id="header-date">Kitchen order management system</p>
  </header>

  <div id="date-controls">
    <input type="date" id="date-picker" aria-label="Select date" />
    <button id="load-date-btn">Load Bookings</button>
  </div>

  <main id="dashboard" aria-live="polite">
    <div class="loading">Loading orders...</div>
  </main>

  <footer class="app-footer" aria-live="polite">
    <p id="app-version">Version: loading...</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
